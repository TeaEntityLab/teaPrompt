version: 1
id: ROUTE-002
name: Holdout Routing Eval
description: Verify routing behavior on unseen boundary phrasing that is not part of ROUTE-001 tuning.

global_expectations:
  phase1_route_consistency_min: 0.80
  aspirational_route_consistency_target: 0.90
  require_route_trace_on_low_confidence: true
  forbid_silent_downgrade: true

trace_required_fields:
  - canonical_intent
  - workflow
  - confidence
  - enhancements_enabled
  - enhancements_available
  - rationale

holdout_sets:
  - name: implementation_holdout
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - wire this into the existing parser
      - patch the failing behavior in code
      - add the missing function
      - change the implementation and verify it
      - turn the accepted state model into an executable workflow

  - name: planning_holdout
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - acceptance_criteria
    phrases:
      - turn this rough idea into tickets
      - define the delivery plan before coding
      - write the acceptance criteria and rollout tasks
      - make a PRD-level breakdown

  - name: workflow_design_holdout
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - transition_ownership
    phrases:
      - specify a resumable workflow with checkpoints and cancellation but no runtime code
      - map the control flow and name whether code model or human owns each transition
      - design the state and artifact contracts for a gated multi-stage process
      - prepare a workflow specification covering retries compensation and observability

  - name: test_planning_holdout
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - requirement_traceability
    phrases:
      - map observable behavior to test cases but leave code untouched
      - produce a test plan with failure signals from the requirements
      - define the smallest regression test matrix, planning only
      - write adversarial checks from acceptance criteria with no implementation changes

  - name: executable_test_holdout
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - add tests to the repository and run them
      - implement the regression test suite
      - update unit tests alongside the code change
      - fix the failing integration test
      - turn this test plan into executable tests in the repository

  - name: review_holdout
    expected_workflow: reflective-review
    expected_rigor: high
    expected_enhancements:
      - quality_review
    phrases:
      - inspect this patch for regressions
      - check whether the diff has mistakes
      - review the behavior changes carefully
      - find likely bugs before merge
      - audit this workflow architecture for unsafe retry behavior

  - name: research_holdout
    expected_workflow: reflective-research
    expected_rigor: medium
    expected_enhancements:
      - source_check
    phrases:
      - compare upstream guidance before we decide
      - look up the official migration notes
      - find source-backed examples for this API
      - research whether this library changed recently
      - compare current workflow architecture guidance from official sources

  - name: workflow_selection_holdout
    expected_workflow: reflective-dispatch
    expected_rigor: low
    expected_enhancements:
      - route_trace
    phrases:
      - decide whether this process needs a prompt a fixed workflow or an autonomous agent
      - choose the smallest orchestration level for this repeated task

  - name: risk_holdout
    expected_workflow: reflective-risk
    expected_rigor: high
    expected_enhancements:
      - human_review_gate
    phrases:
      - check rollback before touching production data
      - verify this permission change will not expose secrets
      - assess whether this migration can lose data
      - pause before the irreversible billing change

  - name: clarification_holdout
    expected_workflow: reflective-brief
    expected_rigor: low
    expected_enhancements:
      - assumption_log
    phrases:
      - I do not know what outcome we want yet
      - first clarify the actual goal
      - identify assumptions before planning
      - scope this before choosing an approach

  - name: minimality_holdout
    expected_workflow: reflective-minimality
    expected_rigor: medium
    expected_enhancements:
      - complexity_cut_list
    phrases:
      - tell me what code we can avoid writing
      - inspect this for bloat without doing a full correctness review
      - prefer stdlib or native behavior over another package
      - do a minimality gate before implementing the helper

  - name: handoff_holdout
    expected_workflow: reflective-handoff-retro
    expected_rigor: low
    expected_enhancements:
      - promotion_candidate
    phrases:
      - capture session lessons for the next agent
      - write a handoff summary before I switch tasks
      - consolidate what we learned into reusable memory
      - prepare a retro before ending this session

  - name: multi_voice_research_holdout
    expected_workflow: reflective-research
    expected_rigor: medium
    expected_enhancements:
      - source_check
    phrases:
      - multi-perspective strategic rethink of our architecture
      - run a multi-voice panel on adoption options
      - six-lens debate on whether to merge these skills
      - compare strategic options using explicit persona lenses

  - name: trivial_implement_holdout
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - quick one-liner fix for the typo
      - small fix for the off-by-one bug
      - patch the trivial null check
      - make a trivial code change to fix the label


evaluation_rules:
  - name: route_equivalence
    assert: same_intent_group_same_workflow
  - name: low_confidence_visibility
    assert: low_confidence_has_route_trace
  - name: enhancement_visibility
    assert: available_enhancements_visible_in_route_trace
  - name: no_silent_downgrade
    assert: downgrade_requires_explicit_rationale
