version: 1
id: ROUTE-003
name: Adversarial Routing Eval
description: Fresh adversarial boundary phrasing separate from ROUTE-001 tuning and ROUTE-002 holdout.

global_expectations:
  phase1_route_consistency_min: 0.80
  aspirational_route_consistency_target: 0.90
  require_route_trace_on_low_confidence: true
  forbid_silent_downgrade: true

trace_required_fields:
  - canonical_intent
  - workflow
  - confidence
  - enhancements_enabled
  - enhancements_available
  - rationale

adversarial_sets:
  - name: handoff_workflow_design_trap
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - transition_ownership
    phrases:
      - design a handoff workflow specification without runtime code
      - plan a manager-and-handoff workflow without writing code
      - specify session transfer checkpoints in a workflow doc only

  - name: trivial_fix_not_review
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - patch the trivial null check in code
      - quick typo fix in the implementation
      - small one-line bug fix in the repo

  - name: production_review_risk
    expected_workflow: reflective-risk
    expected_rigor: high
    expected_enhancements:
      - human_review_gate
    phrases:
      - verify production auth change will not expose secrets
      - check rollback before touching production billing data
      - verify production deploy will not leak secrets
      - production auth change rollback plan before merge

  - name: plain_review_not_risk
    expected_workflow: reflective-review
    expected_rigor: high
    expected_enhancements:
      - quality_review
    phrases:
      - inspect this patch for regressions before merge
      - review the behavior changes carefully in the diff
      - check this patch for readability not security
      - inspect patch for regressions not production deploy risk

  - name: multi_voice_not_dispatch
    expected_workflow: reflective-research
    expected_rigor: medium
    expected_enhancements:
      - source_check
    phrases:
      - six-lens debate on whether to merge these skills
      - multi-perspective strategic rethink with explicit persona lenses
      - six-lens panel debate with explicit persona lenses
      - source-backed library comparison before choosing

  - name: mixed_language_implement
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - 幫我 patch 這個 trivial null check and run tests
      - implement 這個小 fix in the repo

  - name: mixed_language_spec_plan
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - acceptance_criteria
    phrases:
      - 把這個 idea break down into tickets with acceptance criteria
      - write a test plan from the spec without code changes
  - name: dispatch_vs_brief_adversarial
    expected_workflow: reflective-dispatch
    expected_rigor: low
    expected_enhancements:
      - route_trace
    phrases:
      - which workflow skill should run for this library task
      - help me pick the right reflective workflow skill

  - name: retro_lessons_adversarial
    expected_workflow: reflective-handoff-retro
    expected_rigor: low
    expected_enhancements:
      - promotion_candidate
    phrases:
      - lessons learned retro after this sprint
      - sprint retrospective with lessons learned
      - capture lessons learned and promotion candidates from this sprint
      - session handoff summary with reusable rules for next agent

  - name: implement_not_plan_trap
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - ship the code fix for the off-by-one bug
      - implement the approved spec in the repository
      - 在 repository 實作已核准 spec
      - implement 已核准 spec in the repository
      - 落地已核准規格到 codebase

  - name: research_not_brief_trap
    expected_workflow: reflective-research
    expected_rigor: medium
    expected_enhancements:
      - source_check
    phrases:
      - compare official docs for both libraries before deciding
      - source-backed comparison of migration paths




  - name: approved_spec_plan_not_implement_trap
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - acceptance_criteria
    phrases:
      - write tickets from the approved spec without implementing
      - plan the approved spec without repo changes
      - plan 已核准 spec without repo changes
      - draft rollout plan from approved spec without repo edits

  - name: dispatch_meta_skill_trap
    expected_workflow: reflective-dispatch
    expected_rigor: low
    expected_enhancements:
      - route_trace
    phrases:
      - which skill handles session handoff in this library
      - which reflective workflow skill covers handoff retro
      - which reflective workflow skill fits a routing-only mixed intent
      - which reflective workflow skill should handle routing-only mixed intent

  - name: minimality_not_implement_trap
    expected_workflow: reflective-minimality
    expected_rigor: medium
    expected_enhancements:
      - complexity_cut_list
    phrases:
      - challenge whether this abstraction layer is needed
      - run a minimality gate before adding another helper
      - can we delete this wrapper and use stdlib instead
      - avoid overengineering this small formatting helper
      - which dependencies can we remove without breaking tests
      - cut unnecessary abstraction before shipping the feature
      - dependency removal review for this module
      - 少寫程式 surface area in this module

  - name: brief_not_plan_trap
    expected_workflow: reflective-brief
    expected_rigor: low
    expected_enhancements:
      - assumption_log
    phrases:
      - align stakeholders on goals before writing tickets
      - 釐清目標再拆工單


  - name: promotion_not_new_skill_trap
    expected_workflow: reflective-dispatch
    expected_rigor: low
    expected_enhancements:
      - route_trace
    phrases:
      - decide whether this should be a prompt lens or workflow skill not create one yet
      - route artifact promotion before drafting a new skill
      - choose the smallest workflow destination for this recurring process

  - name: untrusted_external_action_risk_trap
    expected_workflow: reflective-risk
    expected_rigor: high
    expected_enhancements:
      - human_review_gate
    phrases:
      - check untrusted external content before executing a permission change
      - verify retrieved instructions cannot authorize destructive production changes
      - assess tool output before changing billing permissions

  - name: scaffold_research_not_review_trap
    expected_workflow: reflective-research
    expected_rigor: medium
    expected_enhancements:
      - source_check
    phrases:
      - research official docs before adopting mirrored agent scaffold
      - compare prompt mirror with source-backed documentation before learning from it
      - investigate scaffold provenance without copying third-party prompt text

  - name: verifier_artifact_not_runner_trap
    expected_workflow: reflective-implement
    expected_rigor: medium
    expected_enhancements:
      - tests
    phrases:
      - automate the recurring manual release check as a deterministic test in the repo
      - turn the recurring manual verification into a deterministic test in the repo
      - add a deterministic verifier test for the recurring format check
      - make the recurring checklist a deterministic test not a new runner

  - name: goal_mode_not_plan_trap
    expected_workflow: reflective-implement
    expected_rigor: medium
    expected_enhancements:
      - tests
    phrases:
      - keep working until every test in test/auth passes
      - don't stop until lint is clean and the build exits 0
      - finish the migration - completion means zero deprecated imports left
      - 持續修到整個測試套件全綠為止

  - name: loop_script_authoring_trap
    expected_workflow: reflective-implement
    expected_rigor: medium
    expected_enhancements:
      - tests
    phrases:
      - write a bash loop that reruns the agent until the verifier passes
      - generate a fix-until-green script with an iteration cap
      - script a writer-critic round harness

evaluation_rules:
  - name: route_equivalence
    assert: same_intent_group_same_workflow
  - name: low_confidence_visibility
    assert: low_confidence_has_route_trace
  - name: enhancement_visibility
    assert: available_enhancements_visible_in_route_trace
  - name: no_silent_downgrade
    assert: downgrade_requires_explicit_rationale
