version: 2
id: ROUTE-001
name: Paraphrase Routing Eval
description: Verify that equivalent intent routes to equivalent reflective workflow and rigor.

global_expectations:
  phase1_route_consistency_min: 0.70
  aspirational_route_consistency_target: 0.95
  require_route_trace_on_low_confidence: true
  forbid_silent_downgrade: true

trace_required_fields:
  - canonical_intent
  - workflow
  - confidence
  - enhancements_enabled
  - enhancements_available
  - rationale

intent_groups:
  - intent: implementation_task
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - Write a function to parse JSON
      - Implement a JSON parser
      - Code a function that parses JSON data
      - Create a JSON parsing function
      - Add JSON parsing to the codebase
      - Fix the JSON parser bug
      - Refactor the JSON parsing logic
      - Patch the parser so it handles empty input
      - Build this feature in the code
      - Make the code change directly
      - Implement a LangGraph workflow with persistence
      - Build the runner from this workflow design

  - intent: spec_planning
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - acceptance_criteria
      - task_breakdown
    phrases:
      - Write a spec for the new feature
      - Create an implementation plan
      - Design the feature specification
      - Plan the development tickets
      - Document the feature requirements
      - Break down the feature into tasks
      - Define acceptance criteria for this work
      - Turn this idea into a PRD
      - Create a roadmap for the workflow
      - Prepare a release plan for this feature

  - intent: workflow_design_only
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - state_and_artifact_contracts
      - transition_ownership
      - recovery_and_observability
    phrases:
      - Design a resumable agent workflow with persisted state, gates, recovery, and human review
      - Turn this SOP into a gated workflow specification without implementing a runner
      - Create a workflow design with sequential parallel routing and evaluator loops
      - Define the state model transitions checkpoints and rollback for this process
      - Plan a manager-and-handoff workflow without writing code
      - Map this process into stages artifacts gates and stop conditions
      - Produce an orchestration plan that separates deterministic and model-decided control
      - Specify a human-in-the-loop workflow with observable failure recovery

  - intent: test_plan_only
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - requirement_traceability
      - negative_and_regression_tests
      - anti_cheating_checks
    phrases:
      - Design a test plan from this spec without writing code
      - Produce acceptance test cases before implementation
      - Create a test matrix for the requirements, plan only
      - Write Given/When/Then scenarios and failure signals
      - Define negative edge and regression tests; do not implement
      - Turn acceptance criteria into tests without changing code
      - Prepare a no-code test strategy
      - Design anti-cheating checks before coding

  - intent: executable_test_work
    expected_workflow: reflective-implement
    expected_rigor: low
    expected_enhancements:
      - tests
    phrases:
      - Add executable regression tests to the codebase
      - Implement the test cases and run them
      - Write unit tests in the repository and verify they pass
      - Update the integration tests and fix any failures
      - Implement the tests described in this test plan

  - intent: code_review
    expected_workflow: reflective-review
    expected_rigor: high
    expected_enhancements:
      - tests
      - security_review
      - quality_review
    phrases:
      - Review this pull request
      - Check the code for issues
      - Audit the implementation
      - Analyze the code changes
      - Examine the pull request
      - Look for bugs in this code
      - Thorough review
      - Check this carefully
      - Look over my code in detail
      - Make sure it actually works
      - Review this like it is going to production
      - Review this workflow design for missing recovery paths

  - intent: research_task
    expected_workflow: reflective-research
    expected_rigor: medium
    expected_enhancements:
      - source_check
      - evidence_map
    phrases:
      - Research the best practices for authentication
      - Find documentation on React hooks
      - Investigate the latest Python frameworks
      - Look up the API documentation
      - Search for information about Kubernetes
      - Find external resources on this topic
      - Compare the official docs with our current usage
      - Check source-backed guidance for this package
      - Find the current official recommendation
      - Research whether this approach is still valid
      - Research current workflow orchestration patterns
      - Compare official framework docs for durable workflow design

  - intent: risk_gating
    expected_workflow: reflective-risk
    expected_rigor: high
    expected_enhancements:
      - rollback_plan
      - human_review_gate
    phrases:
      - Review the security implications
      - Check if this is safe for production
      - Assess the privacy risks
      - Verify the authentication changes
      - Review the deployment plan for risks
      - Check the migration safety
      - Confirm rollback before the destructive step
      - Make sure this delete operation is safe
      - Evaluate compliance risk before shipping
      - Check credential exposure risk
      - Help me avoid breaking production

  - intent: clarification
    expected_workflow: reflective-brief
    expected_rigor: low
    expected_enhancements:
      - assumption_log
    phrases:
      - Clarify the requirements
      - Define the goals and assumptions
      - What should we build?
      - Start by defining the scope
      - Kick off the project planning
      - Begin with goal clarification
      - I am not sure what the real objective is
      - Before deciding, clarify the acceptance criteria
      - The request is unclear; find the intent first
      - Help me define scope before work starts

  - intent: handoff_retro
    expected_workflow: reflective-handoff-retro
    expected_rigor: low
    expected_enhancements:
      - reusable_memory
    phrases:
      - Create a handoff summary
      - Capture the session context for later
      - Write a retrospective after this work
      - Consolidate the lessons into memory
      - Transfer the current state to the next agent
      - Make a session summary so we can continue later
      - Save the context and lessons learned
      - Turn this experience into reusable rules

  - intent: workflow_dispatch
    expected_workflow: reflective-dispatch
    expected_rigor: low
    expected_enhancements:
      - route_trace
    phrases:
      - Which skill should handle this?
      - Choose the right reflective workflow
      - Route this through the prompt library
      - Select prompt-only or agentic workflow
      - Apply the reflective library to this task
      - Dispatch this to the best skill
      - Decide whether this needs a workflow or just a prompt
      - What skill is appropriate here?
      - Choose between a deterministic workflow and a dynamic agent for this process
      - Decide whether this needs a prompt workflow or full agent

  - intent: minimality_gate
    expected_workflow: reflective-minimality
    expected_rigor: medium
    expected_enhancements:
      - complexity_cut_list
      - safety_floor
    phrases:
      - Avoid overengineering this change
      - Can this be deleted instead of implemented?
      - Check whether a standard library or native feature already covers this
      - Run a YAGNI pass before coding
      - Review this diff only for unnecessary complexity
      - Do we need this wrapper and new dependency?
      - Find the smallest implementation that preserves the requirements
      - Challenge the abstraction before adding it
      - Can this be one file instead of a framework?
      - Mark any intentional shortcut with a ceiling and upgrade trigger

adversarial_sets:
  - name: native_engineering
    expected_workflow: reflective-risk
    expected_rigor: high
    expected_enhancements:
      - human_review_gate
    phrases:
      - run full review with tests and security checks
      - check production safety before launch
      - verify credential risk before deployment

  - name: non_native_plain
    expected_workflow: reflective-review
    expected_rigor: medium
    expected_enhancements:
      - route_trace
    phrases:
      - send this up and check carefully
      - help me confirm this has no problem
      - please look if the change has mistake

  - name: pm_language
    expected_workflow: reflective-spec-plan
    expected_rigor: medium
    expected_enhancements:
      - acceptance_criteria
    phrases:
      - turn launch readiness into a delivery plan
      - define customer acceptance criteria
      - turn this idea into a delivery plan

  - name: novice_language
    expected_workflow: reflective-risk
    expected_rigor: high
    expected_enhancements:
      - rollback_plan
    phrases:
      - can you make sure this will not break production
      - help me avoid breaking things
      - check if this is dangerous before changing it

evaluation_rules:
  - name: route_equivalence
    assert: same_intent_group_same_workflow
  - name: low_confidence_visibility
    assert: low_confidence_has_route_trace
  - name: enhancement_visibility
    assert: available_enhancements_visible_in_route_trace
  - name: no_silent_downgrade
    assert: downgrade_requires_explicit_rationale
